<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Biochoric Lab Toolbox</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
    }

    .subtitle {
      color: #888;
      margin-bottom: 48px;
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      max-width: 720px;
      width: 100%;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 28px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s;
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .card:hover {
      border-color: #6c5ce7;
      transform: translateY(-2px);
    }

    .icon {
      font-size: 1.8rem;
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #252836;
      border-radius: 10px;
    }

    .card-body h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
    }

    .card-body p {
      font-size: 0.875rem;
      color: #888;
      line-height: 1.4;
    }

    .arrow {
      margin-left: auto;
      color: #555;
      font-size: 1.2rem;
      align-self: center;
      transition: color 0.2s;
    }

    .card:hover .arrow { color: #6c5ce7; }
  </style>
</head>
<body>
  <h1>Biochoric Lab Toolbox</h1>
  <p class="subtitle">Lab dashboards & tools</p>

  <div class="grid">
    {% for tool in tools %}
    <a href="{{ tool.url }}" class="card" target="_blank" rel="noopener">
      <div class="icon">
        {% if tool.icon == "clipboard" %}&#128203;
        {% elif tool.icon == "thermometer" %}&#127777;&#65039;
        {% else %}&#128295;
        {% endif %}
      </div>
      <div class="card-body">
        <h2>{{ tool.name }}</h2>
        <p>{{ tool.description }}</p>
      </div>
      <span class="arrow">&rarr;</span>
    </a>
    {% endfor %}
  </div>
</body>
</html>
